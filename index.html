// ─── Native Amount Input ──────────────────────────────────────────────────
function Numpad({ value, min, max, onConfirm, onClose }) {
  const inputRef = useRef(null);
  const [draft, setDraft] = useState(String(Math.round(value || min || 0)));

  useEffect(() => {
    setDraft(String(Math.round(value || min || 0)));
    const t = setTimeout(() => {
      inputRef.current?.focus();
      inputRef.current?.select();
    }, 80);
    return () => clearTimeout(t);
  }, [value, min]);

  const sanitize = (v) => v.replace(/\D/g, '').slice(0, 10);
  const setMin = () => setDraft(String(min));
  const setMax = () => setDraft(String(max));
  const numVal = parseInt(draft, 10) || 0;
  const tooLow = numVal < min;
  const tooHigh = numVal > max;
  const valid = !tooLow && !tooHigh;
  const confirm = () => {
    if (!valid) return;
    onConfirm(numVal);
  };

  return (
    <div className="fixed inset-0 z-[60] bg-zinc-950/85 backdrop-blur-md flex items-start justify-center p-4 anim-fade"
      style={{paddingTop:'max(4rem, env(safe-area-inset-top))', paddingBottom:'max(1rem, env(safe-area-inset-bottom))'}}>
      <div className="absolute inset-0" onClick={onClose}/>
      <div className="relative glass-strong w-full max-w-md rounded-3xl p-4 shadow-2xl">
        <div className="flex items-center justify-between mb-3">
          <div className="w-10"/>
          <div className="text-white text-lg font-bold">Enter amount</div>
          <button onClick={onClose} className="w-10 h-10 rounded-full bg-zinc-800 text-zinc-300 flex items-center justify-center font-bold">✕</button>
        </div>

        <div className={`rounded-2xl p-3 mb-3 transition ${tooLow || tooHigh ? 'bg-red-500' : 'bg-emerald-500'}`}>
          <input
            ref={inputRef}
            type="text"
            autoFocus
            inputMode="numeric"
            pattern="[0-9]*"
            enterKeyHint="done"
            value={draft}
            onChange={e => setDraft(sanitize(e.target.value))}
            onKeyDown={e => { if (e.key === 'Enter') confirm(); }}
            onFocus={e => e.currentTarget.select()}
            className="w-full bg-transparent text-white text-center text-5xl font-black tabular-nums focus:outline-none placeholder-white/50"
            placeholder="0"
            aria-label="Amount"
          />
          <div className="text-center text-white/85 text-xs mt-1 font-bold">
            {tooLow ? `Min ${fmt(min)}` : tooHigh ? `Max ${fmt(max)}` : `Range ${fmt(min)} – ${fmt(max)}`}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-3">
          <button onClick={setMin} className="btn-blue text-white py-3 rounded-xl font-bold">Min</button>
          <button onClick={setMax} className="btn-blue text-white py-3 rounded-xl font-bold">Max</button>
        </div>

        <button onClick={confirm} disabled={!valid}
          className={`w-full py-4 rounded-2xl font-black text-lg transition ${valid ? 'btn-primary text-white active:scale-[0.98]' : 'bg-zinc-800 text-zinc-600'}`}>
          Set amount
        </button>
      </div>
    </div>
  );
}

// ─── Raise Modal ─────────────────────────────────────────────────────────
function RaiseModal({ state, player, onClose, onConfirm }) {
  const callAmount = Math.max(0, state.currentBet - player.currentBet);
  const minRaiseTotal = Math.min(player.balance + player.currentBet, state.currentBet + state.minRaiseAmount);
  const maxBet = player.balance + player.currentBet;
  const minBet = state.currentBet === 0
    ? Math.min(state.blindLevels[state.blindLevelIdx]?.big || 1, maxBet)
    : Math.min(maxBet, minRaiseTotal);

  const potNow = state.pot + state.players.reduce((s,p) => s + p.currentBet, 0);
  const potRaiseAmt = (frac) => {
    const target = player.currentBet + callAmount + frac * (potNow + callAmount);
    return Math.max(minBet, Math.min(maxBet, Math.round(target)));
  };

  const [amount, setAmount] = useState(minBet);
  const [numpadOpen, setNumpadOpen] = useState(false);

  const isOpen = state.currentBet === 0;
  const valid = amount >= minBet && amount <= maxBet && amount > player.currentBet;
  const tooLow = amount < minBet;

  const setBounded = (v) => setAmount(Math.max(minBet, Math.min(maxBet, Math.round(v))));
  const quick = (frac) => {
    const v = potRaiseAmt(frac);
    if (v >= minBet) setAmount(v);
  };
  const quickEnabled = (frac) => potRaiseAmt(frac) >= minBet && potRaiseAmt(frac) <= maxBet;

  const fillPct = maxBet > minBet ? ((amount - minBet) / (maxBet - minBet)) * 100 : 50;

  return (
    <Modal onClose={onClose} fullscreen>
      <div className="h-full w-full flex flex-col p-4 bg-zinc-950" style={{paddingBottom:'max(1rem, env(safe-area-inset-bottom))', paddingTop:'max(1rem, env(safe-area-inset-top))'}}>
        <div className="flex items-center justify-between mb-3">
          <div className="w-10"/>
          <h3 className="text-white text-lg font-bold">{STREET_LABELS[state.street]}</h3>
          <button onClick={onClose} className="w-10 h-10 rounded-full bg-zinc-800 text-zinc-300 flex items-center justify-center font-bold text-lg">✕</button>
        </div>

        {/* tappable big amount */}
        <button onClick={() => setNumpadOpen(true)}
          className={`rounded-2xl mb-2 py-5 px-4 transition shadow-xl active:scale-[0.99] ${tooLow ? 'bg-red-500' : 'bg-emerald-500'}`}>
          <div className="flex items-center justify-center gap-2">
            <div className="text-white text-center text-5xl font-black tabular-nums" style={{textShadow:'0 2px 4px rgba(0,0,0,0.3)'}}>
              {fmt(amount)}
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" className="opacity-70">
              <rect x="3" y="6" width="18" height="14" rx="2"/>
              <path d="M7 11h.01M11 11h.01M15 11h.01M7 15h.01M11 15h.01M15 15h.01"/>
            </svg>
          </div>
          <div className="text-white/80 text-xs text-center font-bold mt-1">Tap to enter exact amount</div>
        </button>

        <div className="text-center mb-3 text-zinc-300 text-sm">
          {isOpen ? <span className="text-emerald-300 font-bold">Open bet · Min {fmt(minBet)}</span>
            : <>Call amount: <span className="text-amber-300 font-bold tabular-nums">{fmt(callAmount)}</span></>}
        </div>

        {/* slider */}
        <div className="mb-3 px-2 py-3 glass rounded-2xl">
          <input type="range" min={minBet} max={maxBet} value={amount}
            onChange={e => setAmount(parseInt(e.target.value))}
            className="w-full h-9"
            style={{'--fill': fillPct + '%'}}/>
          <div className="flex justify-between text-[10px] text-zinc-400 font-bold tabular-nums mt-1 px-1">
            <span>{fmt(minBet)}</span><span>{fmt(maxBet)}</span>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-2">
          <button onClick={() => setBounded(amount-1)} className="btn-blue active:scale-95 transition text-white py-3 rounded-xl font-black text-2xl">−</button>
          <button onClick={() => setBounded(amount+1)} className="btn-blue active:scale-95 transition text-white py-3 rounded-xl font-black text-2xl">+</button>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <button onClick={() => setAmount(minBet)} className="btn-blue active:scale-95 transition text-white py-3 rounded-xl font-bold">Min</button>
          <button onClick={() => setAmount(maxBet)} className="btn-blue active:scale-95 transition text-white py-3 rounded-xl font-bold">Max</button>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <button onClick={() => quick(1/3)} disabled={!quickEnabled(1/3)} className="btn-blue disabled:bg-zinc-800 disabled:text-zinc-600 active:scale-95 transition text-white py-3 rounded-xl font-bold">1/3</button>
          <button onClick={() => quick(2/3)} disabled={!quickEnabled(2/3)} className="btn-blue disabled:bg-zinc-800 disabled:text-zinc-600 active:scale-95 transition text-white py-3 rounded-xl font-bold">2/3</button>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <button onClick={() => quick(0.5)} disabled={!quickEnabled(0.5)} className="btn-blue disabled:bg-zinc-800 disabled:text-zinc-600 active:scale-95 transition text-white py-3 rounded-xl font-bold">1/2</button>
          <button onClick={() => quick(1)} disabled={!quickEnabled(1)} className="btn-blue disabled:bg-zinc-800 disabled:text-zinc-600 active:scale-95 transition text-white py-3 rounded-xl font-bold">Pot</button>
        </div>

        <div className="flex-1"/>

        <button onClick={() => onConfirm(amount)} disabled={!valid}
          className={`w-full py-4 rounded-2xl font-black text-lg transition ${valid ? 'btn-red text-white active:scale-[0.98]' : 'bg-zinc-800 text-zinc-600'}`}>
          {isOpen ? 'Bet' : 'Raise'} {fmt(amount)}
        </button>

        {numpadOpen && (
          <Numpad
            value={amount}
            min={minBet}
            max={maxBet}
            onClose={() => setNumpadOpen(false)}
            onConfirm={(v) => { setAmount(v); setNumpadOpen(false); }}
          />
        )}
      </div>
    </Modal>
  );
}

// ─── Manage Player Modal (Re-buy) ────────────────────────────────────────
function ManagePlayerModal({ state, playerId, onClose, onRebuy, onRemovePlayer }) {
  const player = state.players.find(p => p.id === playerId);
  const [amount, setAmount] = useState(state.startingChips);
  const [numpadOpen, setNumpadOpen] = useState(false);
  const [confirming, setConfirming] = useState(false);
  const [confirmingRemove, setConfirmingRemove] = useState(false);
  if (!player) return null;

  const liveHand = state.phase === 'game' || state.phase === 'showdown';
  const rebuyWaitsNextHand = liveHand && player.sittingOut;
  const removeWaitsNextHand = liveHand;

  const presets = [
    Math.round(state.startingChips * 0.5),
    state.startingChips,
    state.startingChips * 2,
  ];

  const doRebuy = () => {
    if (amount > 0) {
      onRebuy(playerId, amount);
      setConfirming(false);
    }
  };

  const doRemove = () => {
    onRemovePlayer(playerId);
    setConfirmingRemove(false);
  };

  return (
    <Modal onClose={onClose}>
      <div className="text-center mb-4">
        <div className={`mx-auto w-14 h-14 rounded-full bg-gradient-to-br ${PG[player.colorIdx]} flex items-center justify-center text-white font-black text-xl shadow-lg mb-2`}>
          {player.name[0]?.toUpperCase()}
        </div>
        <div className="text-white text-xl font-bold">{player.name}</div>
        <div className="text-zinc-400 text-xs mt-1">
          Balance: <span className="text-amber-300 font-bold tabular-nums">{fmt(player.balance)}</span>
          <span className="mx-1.5 text-zinc-700">·</span>
          Buy-ins: <span className="text-white font-bold">{player.buyIns || 1}</span>
        </div>
        {player.requestRemove && (
          <div className="mt-2 rounded-xl bg-red-500/15 border border-red-400/30 px-3 py-2 text-center text-[11px] font-bold text-red-200">
            This player is marked to leave after the current hand.
          </div>
        )}
      </div>

      {confirmingRemove ? (
        <div className="anim-fade">
          <div className="text-center text-zinc-300 text-sm mb-3">
            Remove <span className="text-white font-bold">{player.name}</span> from the table?
            {removeWaitsNextHand && <div className="text-amber-300 text-xs font-bold mt-2">Current hand will not be broken. They will leave before the next hand.</div>}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setConfirmingRemove(false)} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Cancel</button>
            <button onClick={doRemove} className="py-3 rounded-2xl btn-red text-white font-black">Remove</button>
          </div>
        </div>
      ) : !confirming ? (
        <>
          <div className="glass rounded-2xl p-3 mb-3">
            <div className="text-zinc-400 text-xs font-bold uppercase tracking-wider mb-2 text-center">Add chips / Re-buy</div>
            {rebuyWaitsNextHand && (
              <div className="mb-2 rounded-xl bg-amber-500/15 border border-amber-400/30 px-3 py-2 text-center text-[11px] font-bold text-amber-200">
                This player gets chips now, but stays out until the next hand.
              </div>
            )}
            <button onClick={() => setNumpadOpen(true)}
              className="w-full bg-emerald-500 active:bg-emerald-600 active:scale-[0.99] transition rounded-xl py-3 px-4 mb-2">
              <div className="text-white text-3xl font-black tabular-nums">+{fmt(amount)}</div>
              <div className="text-white/80 text-[10px] font-bold mt-0.5">Tap to edit</div>
            </button>
            <div className="grid grid-cols-3 gap-1.5">
              {presets.map(p => (
                <button key={p} onClick={() => setAmount(p)}
                  className={`py-2 rounded-lg text-xs font-bold transition ${amount === p ? 'bg-emerald-500 text-white' : 'btn-dark text-zinc-300'}`}>
                  +{fmt(p)}
                </button>
              ))}
            </div>
          </div>

          <button
            onClick={() => setConfirmingRemove(true)}
            disabled={player.requestRemove}
            className="w-full py-3 rounded-2xl bg-red-500/15 border border-red-500/30 text-red-300 font-bold active:scale-95 disabled:opacity-40 mb-2"
          >
            {removeWaitsNextHand ? 'Remove after hand' : 'Remove from table'}
          </button>

          <div className="grid grid-cols-2 gap-2">
            <button onClick={onClose} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Cancel</button>
            <button onClick={() => setConfirming(true)} disabled={amount <= 0}
              className="py-3 rounded-2xl btn-primary text-white font-black disabled:opacity-40">
              Re-buy
            </button>
          </div>
        </>
      ) : (
        <div className="anim-fade">
          <div className="text-center text-zinc-300 text-sm mb-3">
            Add <span className="text-emerald-300 font-black tabular-nums">{fmt(amount)}</span> chips to <span className="text-white font-bold">{player.name}</span>?
            {rebuyWaitsNextHand && <div className="text-amber-300 text-xs font-bold mt-2">They will not enter this hand.</div>}
          </div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setConfirming(false)} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Cancel</button>
            <button onClick={doRebuy} className="py-3 rounded-2xl btn-primary text-white font-black">Confirm</button>
          </div>
        </div>
      )}

      {numpadOpen && (
        <Numpad
          value={amount}
          min={1}
          max={1000000000}
          onClose={() => setNumpadOpen(false)}
          onConfirm={(v) => { setAmount(v); setNumpadOpen(false); }}
        />
      )}
    </Modal>
  );
}

// ─── Showdown ────────────────────────────────────────────────────────────
function ShowdownPanel({ state, onAward }) {
  const pots = state.showdownData?.pots || [];
  const [awards, setAwards] = useState(() => pots.map(() => []));
  const playersById = useMemo(() => Object.fromEntries(state.players.map(p => [p.id, p])), [state.players]);

  const togglePotWinner = (potIdx, playerId) => {
    setAwards(a => a.map((ids, i) => {
      if (i !== potIdx) return ids;
      return ids.includes(playerId) ? ids.filter(id => id !== playerId) : [...ids, playerId];
    }));
  };
  const allSelected = pots.every((_, i) => awards[i] && awards[i].length > 0);

  return (
    <div className="glass-strong rounded-2xl max-h-[55vh] overflow-y-auto">
      <div className="px-4 py-3 border-b border-zinc-800 sticky top-0 bg-zinc-900/95 backdrop-blur z-10">
        <div className="text-center text-white font-bold">Showdown</div>
        <div className="text-center text-zinc-400 text-xs">Select pot winner(s)</div>
      </div>
      <div className="p-3 space-y-3">
        {pots.map((pot, i) => {
          const eligible = pot.eligibleIds.map(id => playersById[id]).filter(Boolean);
          const sel = awards[i] || [];
          const each = sel.length > 0 ? Math.floor(pot.amount / sel.length) : 0;
          return (
            <div key={i}>
              <div className="text-white font-bold text-sm mb-1.5">
                {i === 0 ? 'Main pot' : `Side pot ${i}`}: <span className="text-amber-300 tabular-nums">{fmt(pot.amount)}</span>
              </div>
              <div className="grid grid-cols-2 gap-1.5">
                {eligible.map(p => {
                  const isSel = sel.includes(p.id);
                  return (
                    <button key={p.id} onClick={() => togglePotWinner(i, p.id)}
                      className={`px-2 py-2 rounded-xl font-bold text-sm transition border-2 flex items-center justify-between ${isSel ? 'btn-blue border-blue-300 text-white' : 'bg-zinc-800/60 border-transparent text-zinc-300'}`}>
                      <span className="truncate flex-1 text-left">{p.name}</span>
                      {isSel && <span className="text-[10px] tabular-nums shrink-0 ml-1">+{fmt(each)}</span>}
                    </button>
                  );
                })}
              </div>
              <div className="text-zinc-500 text-[11px] mt-1 text-center">{sel.length}/{eligible.length} selected</div>
            </div>
          );
        })}
      </div>
      <div className="p-3 border-t border-zinc-800">
        <button onClick={() => onAward(awards)} disabled={!allSelected}
          className={`w-full py-3 rounded-2xl font-black transition ${allSelected ? 'btn-primary text-white active:scale-[0.98]' : 'bg-zinc-800 text-zinc-600'}`}>
          Award & Next hand
        </button>
      </div>
    </div>
  );
}

// ─── Handover ────────────────────────────────────────────────────────────
function HandoverPanel({ state, onNext }) {
  const winner = state.handoverData?.winnerIds?.[0]
    ? state.players.find(p => p.id === state.handoverData.winnerIds[0])
    : null;
  const totals = {};
  if (state.handoverData?.reason === 'showdown' && state.handoverData.awards) {
    state.handoverData.awards.forEach((winners, i) => {
      const pot = state.handoverData.pots[i];
      const ids = winners.length > 0 ? winners : pot.eligibleIds;
      const each = Math.floor(pot.amount / ids.length);
      ids.forEach((id, k) => {
        totals[id] = (totals[id] || 0) + each + (k === 0 ? pot.amount - each * ids.length : 0);
      });
    });
  }

  return (
    <div className="glass-strong rounded-2xl p-4 anim-slide">
      {state.handoverData?.reason === 'fold' && winner && (
        <div className="text-center mb-3">
          <div className="text-zinc-400 text-xs uppercase tracking-wider font-bold mb-1">Hand won by</div>
          <div className="text-white text-xl font-black">{winner.name}</div>
          <div className="text-amber-300 text-3xl font-black tabular-nums mt-1 win-glow">+{fmt(state.handoverData.amount)}</div>
        </div>
      )}
      {state.handoverData?.reason === 'showdown' && (
        <div className="mb-3">
          <div className="text-zinc-400 text-xs uppercase tracking-wider font-bold mb-2 text-center">Pot awarded</div>
          <div className="space-y-1">
            {Object.entries(totals).map(([id, amt]) => {
              const p = state.players.find(x => x.id === id);
              if (!p) return null;
              return (
                <div key={id} className="flex justify-between bg-zinc-800/60 rounded-xl px-3 py-2">
                  <span className="text-white font-bold">{p.name}</span>
                  <span className="text-amber-300 font-black tabular-nums win-glow">+{fmt(amt)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <button onClick={onNext} className="w-full py-3 rounded-2xl font-black btn-primary text-white active:scale-[0.98]">
        Next hand
      </button>
    </div>
  );
}

// ─── Confetti ────────────────────────────────────────────────────────────
function ConfettiBurst() {
  const pieces = useMemo(() => {
    return Array.from({length: 60}).map(() => ({
      cx: (Math.random() * 200 - 100) + 'vw',  // start x offset relative to center
      cdx: (Math.random() * 80 - 40) + 'vw',
      crot: (Math.random() * 720 - 360) + 'deg',
      cdur: (1.8 + Math.random() * 1.6) + 's',
      delay: Math.random() * 0.4 + 's',
      color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      width: (6 + Math.random() * 8) + 'px',
      height: (10 + Math.random() * 8) + 'px',
    }));
  }, []);
  return (
    <div className="fixed inset-0 pointer-events-none z-40 overflow-hidden">
      {pieces.map((p, i) => (
        <div
          key={i}
          className="confetti-piece"
          style={{
            background: p.color,
            width: p.width, height: p.height,
            animationDelay: p.delay,
            '--cx': p.cx,
            '--cdx': p.cdx,
            '--crot': p.crot,
            '--cdur': p.cdur,
          }}
        />
      ))}
    </div>
  );
}

// ─── Game Over ───────────────────────────────────────────────────────────
function GameOver({ state, onReset }) {
  const sorted = [...state.players].sort((a,b) => b.balance - a.balance);
  const winner = sorted[0];
  return (
    <div className="h-[100dvh] w-screen bg-zinc-950 flex flex-col items-center justify-center px-6 text-white relative overflow-hidden">
      <ConfettiBurst/>
      <div className="text-6xl mb-4 anim-pop">🏆</div>
      <h1 className="text-3xl font-black mb-1 win-glow text-amber-300">Game Over</h1>
      <p className="text-zinc-400 mb-6">{winner?.name} wins!</p>
      <div className="w-full max-w-sm glass rounded-2xl p-4 mb-6 space-y-2">
        {sorted.map((p,i) => (
          <div key={p.id} className="flex items-center gap-3">
            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-black ${i===0?'bg-yellow-400 text-zinc-900':'bg-zinc-700 text-zinc-300'}`}>{i+1}</div>
            <div className="flex-1 text-white font-bold">{p.name}</div>
            <div className="text-zinc-500 text-xs">×{p.buyIns || 1}</div>
            <div className="text-amber-300 font-black tabular-nums">{fmt(p.balance)}</div>
          </div>
        ))}
      </div>
      <button onClick={onReset} className="w-full max-w-sm py-4 rounded-2xl btn-primary text-white font-black text-lg active:scale-[0.98]">
        New Game
      </button>
    </div>
  );
}

// ─── Menu Modal ──────────────────────────────────────────────────────────
function MenuModal({ state, onClose, onAbandon, onAddPlayer }) {
  const [confirm, setConfirm] = useState(false);
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState('');
  const [newAmount, setNewAmount] = useState(state.startingChips);
  const [amountOpen, setAmountOpen] = useState(false);
  const sorted = [...state.players].sort((a,b) => b.balance - a.balance);
  const lvl = state.blindLevels[state.blindLevelIdx];
  const activePlayerCount = state.players.filter(p => !p.requestRemove).length;
  const nameTaken = state.players.some(p => p.name.trim().toLowerCase() === newName.trim().toLowerCase());
  const canAdd = state.players.length < 9 && newName.trim().length > 0 && !nameTaken;
  const joinsNextHand = state.phase === 'game' || state.phase === 'showdown' || state.phase === 'handover';

  const doAdd = () => {
    if (!canAdd) return;
    onAddPlayer(newName, newAmount);
  };

  return (
    <Modal onClose={onClose}>
      <div className="text-center mb-3">
        <div className="text-zinc-500 text-[10px] uppercase tracking-widest font-bold">Game</div>
        <div className="text-white text-xl font-bold">Hand #{state.handsPlayed}</div>
        {lvl && <div className="text-zinc-400 text-xs">Blinds {lvl.big}/{lvl.small} · Level {state.blindLevelIdx+1}/{state.blindLevels.length}</div>}
      </div>

      {!confirm && (
        <div className="glass rounded-2xl p-3 mb-3">
          {!adding ? (
            <button onClick={() => setAdding(true)} disabled={state.players.length >= 9}
              className="w-full py-3 rounded-2xl btn-blue text-white font-black disabled:opacity-40">
              + Add player
            </button>
          ) : (
            <div className="space-y-2 anim-fade">
              <input
                value={newName}
                onChange={e => setNewName(e.target.value.slice(0, 14))}
                onKeyDown={e => e.key === 'Enter' && doAdd()}
                autoFocus
                placeholder={`Player ${activePlayerCount + 1}`}
                className="w-full bg-zinc-800/80 rounded-xl px-4 py-3 text-white focus:outline-none border border-zinc-700"
                maxLength={14}
                autoCapitalize="words"
              />
              <button onClick={() => setAmountOpen(true)} className="w-full bg-emerald-500 active:bg-emerald-600 active:scale-[0.99] transition rounded-xl py-3 px-4">
                <div className="text-white text-2xl font-black tabular-nums">{fmt(newAmount)}</div>
                <div className="text-white/80 text-[10px] font-bold mt-0.5">Buy-in amount · tap to edit</div>
              </button>
              {joinsNextHand && (
                <div className="rounded-xl bg-amber-500/15 border border-amber-400/30 px-3 py-2 text-center text-[11px] font-bold text-amber-200">
                  New player will join from the next hand.
                </div>
              )}
              {nameTaken && <div className="text-red-300 text-xs font-bold text-center">This name is already on the table.</div>}
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => { setAdding(false); setNewName(''); }} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Cancel</button>
                <button onClick={doAdd} disabled={!canAdd} className="py-3 rounded-2xl btn-primary text-white font-black disabled:opacity-40">Add</button>
              </div>
            </div>
          )}
        </div>
      )}

      <div className="space-y-1.5 mb-4 max-h-72 overflow-y-auto">
        {sorted.map((p, i) => (
          <div key={p.id} className="flex items-center gap-2 bg-zinc-800/60 rounded-xl px-2 py-1.5">
            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-black ${i===0?'bg-yellow-400 text-zinc-900':'bg-zinc-700 text-zinc-300'}`}>{i+1}</div>
            <div className="flex-1 min-w-0">
              <div className="text-white font-bold text-sm truncate">{p.name}</div>
              {p.requestRemove && <div className="text-red-300 text-[10px] font-bold leading-tight">Leaving after hand</div>}
            </div>
            <div className="text-zinc-500 text-[10px]">×{p.buyIns || 1}</div>
            <div className="text-amber-300 font-black tabular-nums text-sm">{fmt(p.balance)}</div>
          </div>
        ))}
      </div>
      {!confirm ? (
        <div className="grid grid-cols-2 gap-2">
          <button onClick={onClose} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Close</button>
          <button onClick={() => setConfirm(true)} className="py-3 rounded-2xl bg-red-500/15 border border-red-500/30 text-red-300 font-bold active:scale-95">End Game</button>
        </div>
      ) : (
        <div className="space-y-2 anim-fade">
          <div className="text-center text-zinc-300 text-sm py-1">End game and return to setup?</div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setConfirm(false)} className="py-3 rounded-2xl btn-dark text-zinc-200 font-bold">Cancel</button>
            <button onClick={onAbandon} className="py-3 rounded-2xl btn-red text-white font-black">End</button>
          </div>
        </div>
      )}

      {amountOpen && (
        <Numpad
          value={newAmount}
          min={1}
          max={1000000000}
          onClose={() => setAmountOpen(false)}
          onConfirm={(v) => { setNewAmount(v); setAmountOpen(false); }}
        />
      )}
    </Modal>
  );
}

// ─── Generic Modal ───────────────────────────────────────────────────────
function Modal({ children, onClose, fullscreen }) {
  useEffect(() => {
    const onEsc = (e) => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', onEsc);
    return () => document.removeEventListener('keydown', onEsc);
  }, [onClose]);
  if (fullscreen) return <div className="fixed inset-0 z-50 anim-fade">{children}</div>;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center anim-fade">
      <div className="absolute inset-0 bg-black/75 backdrop-blur-md" onClick={onClose}/>
      <div className="relative glass-strong w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-4 max-h-[90vh] overflow-y-auto anim-slide" style={{paddingBottom:'max(1rem, env(safe-area-inset-bottom))'}}>
        <div className="w-12 h-1.5 bg-zinc-700 rounded-full mx-auto mb-3 sm:hidden"/>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
