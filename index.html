  /* ───── Premium gradient buttons ───── */

<body class="text-white">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const fmt = (n) => Math.round(Number(n) || 0).toLocaleString();
const STREETS = ['preflop','flop','turn','river'];

// ─── v2.1: persistence ───────────────────────────────────────────────────
const STORAGE_KEY = 'pokerTrackerV21';
const loadSaved = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || s.phase === 'setup' || s.phase === 'gameover') return null;
    return s;
  } catch { return null; }
};
const saveState = (s) => {
  try {
    if (!s || s.phase === 'setup') { localStorage.removeItem(STORAGE_KEY); return; }
    const { modal, ...rest } = s;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rest));
  } catch {}
};
const clearSaved = () => { try { localStorage.removeItem(STORAGE_KEY); } catch {} };

// ─── v2.1: Web-Audio sound engine ────────────────────────────────────────
let audioCtx = null;
const ensureAudio = () => {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (audioCtx?.state === 'suspended') audioCtx.resume();
  return audioCtx;
};
const beep = (freq, dur, type='sine', vol=0.15, attack=0.005, decay=null) => {
  const ctx = ensureAudio(); if (!ctx) return;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, ctx.currentTime);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (decay || dur));
  o.connect(g).connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime + dur + 0.05);
};
const sfx = {
  chip: () => { beep(880, 0.08, 'square', 0.08); setTimeout(() => beep(1320, 0.06, 'square', 0.06), 40); },
  check: () => beep(440, 0.1, 'sine', 0.1),
  fold: () => beep(180, 0.15, 'sawtooth', 0.08),
  card: () => beep(2200, 0.04, 'sine', 0.05, 0.001, 0.04),
  win: () => {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.12), i * 90));
  },
  click: () => beep(600, 0.03, 'sine', 0.05, 0.001, 0.03),
};
let soundOn = true;
try { soundOn = localStorage.getItem('pokerSoundOn') !== '0'; } catch {}
const playSfx = (name) => { if (soundOn && sfx[name]) sfx[name](); };
const setSoundOn = (v) => { soundOn = v; try { localStorage.setItem('pokerSoundOn', v ? '1' : '0'); } catch {} };

const STREET_LABELS = { preflop:'Preflop', flop:'Flop', turn:'Turn', river:'River', showdown:'Showdown', handover:'Hand Over' };
const STREET_CARDS = { preflop:0, flop:3, turn:4, river:5, showdown:5, handover:5 };
const PG = [
  'from-rose-500 to-rose-700',
  'from-sky-500 to-sky-700',
  'from-emerald-500 to-emerald-700',
  'from-violet-500 to-violet-700',
  'from-amber-500 to-amber-700',
  'from-pink-500 to-pink-700',
  'from-cyan-500 to-cyan-700',
  'from-orange-500 to-orange-700',
  'from-indigo-500 to-indigo-700',
];
const CONFETTI_COLORS = ['#fbbf24','#f43f5e','#22c55e','#3b82f6','#a855f7','#ec4899','#06b6d4','#facc15'];

// ─── engine helpers ──────────────────────────────────────────────────────
function nextDealtIn(players, fromIdx) {
  const n = players.length;
  for (let i = 1; i <= n; i++) {
    const idx = (fromIdx + i) % n;
    if (!players[idx].sittingOut) return idx;
  }
  return -1;
}
function nextActive(players, fromIdx) {
  const n = players.length;
  for (let i = 1; i <= n; i++) {
    const idx = (fromIdx + i) % n;
    const p = players[idx];
    if (!p.sittingOut && !p.hasFolded && !p.isAllIn) return idx;
  }
  return -1;
}
function roundComplete(players, currentBet) {
  const canAct = players.filter(p => !p.sittingOut && !p.hasFolded && !p.isAllIn);
  if (canAct.length === 0) return true;
  return canAct.every(p => p.hasActedThisRound && p.currentBet === currentBet);
}
function calcSidePots(players) {
  const contribs = players.filter(p => p.totalCommittedHand > 0)
    .map(p => ({ id: p.id, amount: p.totalCommittedHand, folded: p.hasFolded }));
  if (!contribs.length) return [];
  const levels = [...new Set(contribs.map(c => c.amount))].sort((a,b) => a-b);
  let prev = 0;
  const pots = [];
  for (const lvl of levels) {
    const c = contribs.filter(x => x.amount >= lvl);
    const tier = (lvl - prev) * c.length;
    if (tier > 0) {
      const eligible = c.filter(x => !x.folded).map(x => x.id);
      const last = pots[pots.length - 1];
      const same = last && last.eligibleIds.length === eligible.length &&
        last.eligibleIds.every(id => eligible.includes(id));
      if (same) last.amount += tier;
      else pots.push({ amount: tier, eligibleIds: eligible });
    }
    prev = lvl;
  }
  return pots.filter(p => p.eligibleIds.length > 0);
}
function playerIndexById(players, id) {
  return id ? players.findIndex(p => p.id === id) : -1;
}
function dealerAnchorForNextHand(state, nextPlayers) {
  if (!nextPlayers.length) return 0;
  const oldDealer = state.players[state.dealerIdx];
  const sameDealerIdx = playerIndexById(nextPlayers, oldDealer?.id);
  if (sameDealerIdx >= 0) return sameDealerIdx;
  const keptBeforeOldDealer = state.players
    .slice(0, Math.max(0, state.dealerIdx))
    .filter(oldP => nextPlayers.some(np => np.id === oldP.id)).length;
  return keptBeforeOldDealer - 1;
}
function remapIndexesAfterPlayerListChange(state, nextPlayers) {
  const safeIdx = (oldIdx) => {
    if (!nextPlayers.length) return 0;
    const oldPlayer = state.players[oldIdx];
    const sameIdx = playerIndexById(nextPlayers, oldPlayer?.id);
    if (sameIdx >= 0) return sameIdx;
    return Math.min(Math.max(0, oldIdx), nextPlayers.length - 1);
  };
  return {
    ...state,
    players: nextPlayers,
    dealerIdx: dealerAnchorForNextHand(state, nextPlayers),
    sbIdx: safeIdx(state.sbIdx),
    bbIdx: safeIdx(state.bbIdx),
    turnIdx: safeIdx(state.turnIdx),
  };
}
function startHand(state, isFirst) {
  let handState = state;
  if (!isFirst && state.players.some(p => p.requestRemove)) {
    const nextPlayers = state.players.filter(p => !p.requestRemove);
    handState = remapIndexesAfterPlayerListChange(state, nextPlayers);
  }

  const players = handState.players.map(p => ({
    ...p,
    currentBet: 0, totalCommittedHand: 0,
    hasFolded: false, isAllIn: false,
    hasActedThisRound: false, lastAction: null,
    sittingOut: p.balance <= 0 || p.requestSitOut === true,
    requestSitOut: false,
    requestRemove: false,
  }));
  const dealtIn = players.filter(p => !p.sittingOut);
  if (dealtIn.length < 2) return { ...handState, players, phase: 'gameover' };

  let dealerIdx;
  if (isFirst) {
    dealerIdx = handState.initialDealerIdx;
    if (dealerIdx == null || dealerIdx < 0 || players[dealerIdx]?.sittingOut) {
      dealerIdx = nextDealtIn(players, dealerIdx ?? -1);
    }
  } else {
    dealerIdx = nextDealtIn(players, handState.dealerIdx);
  }

  let sbIdx, bbIdx;
  if (dealtIn.length === 2) {
    sbIdx = dealerIdx;
    bbIdx = nextDealtIn(players, dealerIdx);
  } else {
    sbIdx = nextDealtIn(players, dealerIdx);
    bbIdx = nextDealtIn(players, sbIdx);
  }

  const lvl = handState.blindLevels[handState.blindLevelIdx] || handState.blindLevels.at(-1);
  const sbAmt = Math.min(lvl.small, players[sbIdx].balance);
  players[sbIdx] = {
    ...players[sbIdx],
    balance: players[sbIdx].balance - sbAmt,
    currentBet: sbAmt, totalCommittedHand: sbAmt,
    isAllIn: players[sbIdx].balance - sbAmt === 0,
  };
  const bbAmt = Math.min(lvl.big, players[bbIdx].balance);
  players[bbIdx] = {
    ...players[bbIdx],
    balance: players[bbIdx].balance - bbAmt,
    currentBet: bbAmt, totalCommittedHand: bbAmt,
    isAllIn: players[bbIdx].balance - bbAmt === 0,
  };

  const firstToAct = dealtIn.length === 2 ? sbIdx : nextActive(players, bbIdx);
  const newHandNum = handState.handsPlayed + 1;
  const newLog = [...(handState.actionLog || []), {
    type: 'hand_start', hand: newHandNum, dealer: players[dealerIdx].name,
    sb: { name: players[sbIdx].name, amount: sbAmt },
    bb: { name: players[bbIdx].name, amount: bbAmt },
    blindLevel: handState.blindLevelIdx + 1,
  }];

  return {
    ...handState, players,
    dealerIdx, sbIdx, bbIdx, turnIdx: firstToAct,
    pot: 0, currentBet: bbAmt, minRaiseAmount: lvl.big,
    lastRaiserIdx: bbIdx,
    street: 'preflop', phase: 'game',
    handsPlayed: newHandNum,
    showdownData: null, handoverData: null,
    streetAnimKey: (handState.streetAnimKey || 0) + 1,
    actionLog: newLog,
  };
}
function endHandSinglePlayer(state) {
  const collected = state.players.reduce((s,p) => s + p.currentBet, 0);
  const totalPot = state.pot + collected;
  let players = state.players.map(p => ({ ...p, currentBet: 0 }));
  const winnerIdx = players.findIndex(p => !p.hasFolded && !p.sittingOut);
  if (winnerIdx >= 0) {
    players[winnerIdx] = { ...players[winnerIdx], balance: players[winnerIdx].balance + totalPot };
  }
  return { ...state, players, pot: 0, phase: 'handover',
    handoverData: { winnerIds: [players[winnerIdx]?.id], amount: totalPot, reason: 'fold' } };
}
function advanceStreet(state) {
  const collected = state.players.reduce((s,p) => s + p.currentBet, 0);
  let players = state.players.map(p => ({
    ...p, currentBet: 0, hasActedThisRound: false, lastAction: null,
  }));
  const idx = STREETS.indexOf(state.street);
  const next = STREETS[idx + 1];
  const newPot = state.pot + collected;
  if (!next) return goToShowdown({ ...state, players, pot: newPot, currentBet: 0, street: 'river' });

  const canBet = players.filter(p => !p.sittingOut && !p.hasFolded && !p.isAllIn);
  if (canBet.length < 2) {
    return advanceStreet({ ...state, players, pot: newPot, currentBet: 0, street: next,
      streetAnimKey: (state.streetAnimKey || 0) + 1 });
  }
  return {
    ...state, players,
    pot: newPot, currentBet: 0,
    minRaiseAmount: state.blindLevels[state.blindLevelIdx]?.big || 10,
    lastRaiserIdx: null, street: next,
    turnIdx: nextActive(players, state.dealerIdx),
    streetAnimKey: (state.streetAnimKey || 0) + 1,
  };
}
function goToShowdown(state) {
  const pots = calcSidePots(state.players);
  return { ...state, phase:'showdown', showdownData: { pots, awards: pots.map(() => []) },
    streetAnimKey: (state.streetAnimKey || 0) + 1 };
}
function processAfter(state) {
  const remaining = state.players.filter(p => !p.hasFolded && !p.sittingOut);
  if (remaining.length <= 1) return endHandSinglePlayer(state);
  if (roundComplete(state.players, state.currentBet)) return advanceStreet(state);
  return { ...state, turnIdx: nextActive(state.players, state.turnIdx) };
}

// ─── initial state ───────────────────────────────────────────────────────
const initialState = {
  phase: 'setup',
  startingChips: 1000,
  blindLevels: [
    { big: 10, small: 5,  duration: 20 },
    { big: 20, small: 10, duration: 20 },
    { big: 40, small: 20, duration: 20 },
  ],
  durationUnit: 'Minutes',
  initialDealerIdx: 0,
  randomDealer: true,
  players: [],
  dealerIdx: 0, sbIdx: 0, bbIdx: 0, turnIdx: 0,
  pot: 0, currentBet: 0, minRaiseAmount: 0, lastRaiserIdx: null,
  blindLevelIdx: 0, timeRemainingSec: 0, handsPlayed: 0,
  street: 'preflop',
  history: [],
  showdownData: null, handoverData: null,
  modal: null, streetAnimKey: 0,
};

// ─── App ─────────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState(initialState);

  useEffect(() => {
    if (state.phase === 'setup' || state.phase === 'gameover') return;
    if (state.durationUnit !== 'Minutes' || state.timeRemainingSec <= 0) return;
    const id = setInterval(() => {
      setState(s => {
        if (s.phase === 'setup' || s.phase === 'gameover') return s;
        if (s.timeRemainingSec <= 1) {
          if (s.blindLevelIdx < s.blindLevels.length - 1) {
            const ni = s.blindLevelIdx + 1;
            return { ...s, blindLevelIdx: ni, timeRemainingSec: (s.blindLevels[ni]?.duration || 0) * 60 };
          }
          return { ...s, timeRemainingSec: 0 };
        }
        return { ...s, timeRemainingSec: s.timeRemainingSec - 1 };
      });
    }, 1000);
    return () => clearInterval(id);
  }, [state.phase, state.durationUnit, state.timeRemainingSec]);

  const pushAction = useCallback((updater) => {
    setState(s => {
      const snap = { ...s, history: undefined, modal: null };
      const next = updater(s);
      return { ...next, history: [...(s.history || []), snap].slice(-50) };
    });
  }, []);
  const undo = () => setState(s => {
    if (!s.history?.length) return s;
    const last = s.history[s.history.length - 1];
    return { ...last, history: s.history.slice(0, -1) };
  });

  function startGame(setup) {
    const players = setup.seatedPlayers.map((name, i) => ({
      id: 'p'+i+'_'+Math.random().toString(36).slice(2,7),
      name, balance: setup.startingChips,
      currentBet: 0, totalCommittedHand: 0,
      hasFolded: false, isAllIn: false,
      hasActedThisRound: false, lastAction: null,
      sittingOut: false, colorIdx: i % PG.length,
      buyIns: 1,
    }));
    const fresh = {
      ...initialState,
      ...setup,
      players,
      blindLevelIdx: 0,
      timeRemainingSec: (setup.blindLevels[0]?.duration || 0) * 60,
      handsPlayed: 0,
      history: [],
    };
    setState(startHand(fresh, true));
  }

  const fold = () => pushAction(s => {
    const players = s.players.map((p,i) => i === s.turnIdx
      ? { ...p, hasFolded:true, hasActedThisRound:true, lastAction:'Fold' } : p);
    return processAfter({ ...s, players });
  });
  const check = () => pushAction(s => {
    const players = s.players.map((p,i) => i === s.turnIdx
      ? { ...p, hasActedThisRound:true, lastAction:'Check' } : p);
    return processAfter({ ...s, players });
  });
  const call = () => pushAction(s => {
    const p = s.players[s.turnIdx];
    const amt = Math.min(s.currentBet - p.currentBet, p.balance);
    const players = s.players.map((pl,i) => i === s.turnIdx ? {
      ...pl,
      balance: pl.balance - amt,
      currentBet: pl.currentBet + amt,
      totalCommittedHand: pl.totalCommittedHand + amt,
      hasActedThisRound: true,
      isAllIn: pl.balance - amt === 0,
      lastAction: amt === 0 ? 'Check' : 'Call',
    } : pl);
    return processAfter({ ...s, players });
  });
  const raise = (totalBet) => pushAction(s => {
    const p = s.players[s.turnIdx];
    const additional = totalBet - p.currentBet;
    if (additional <= 0 || additional > p.balance) return s;
    const raiseSize = totalBet - s.currentBet;
    const isOpen = s.currentBet === 0;
    const isAllIn = p.balance - additional === 0;
    const newMin = Math.max(s.minRaiseAmount, raiseSize);
    const players = s.players.map((pl,i) => {
      if (i === s.turnIdx) return {
        ...pl, balance: pl.balance - additional, currentBet: totalBet,
        totalCommittedHand: pl.totalCommittedHand + additional,
        hasActedThisRound: true, isAllIn,
        lastAction: isOpen ? 'Bet' : 'Raise',
      };
      if (!pl.hasFolded && !pl.isAllIn && !pl.sittingOut) return { ...pl, hasActedThisRound: false };
      return pl;
    });
    return processAfter({ ...s, players, currentBet: totalBet, minRaiseAmount: newMin, lastRaiserIdx: s.turnIdx });
  });

  const awardShowdown = (awards) => pushAction(s => {
    const pots = s.showdownData.pots;
    let players = [...s.players];
    let totalAwarded = 0;
    for (let i = 0; i < pots.length; i++) {
      const winners = (awards[i]?.length > 0) ? awards[i] : pots[i].eligibleIds;
      if (!winners.length) continue;
      const each = Math.floor(pots[i].amount / winners.length);
      const rem = pots[i].amount - each * winners.length;
      players = players.map(p => {
        if (!winners.includes(p.id)) return p;
        const isFirst = winners[0] === p.id;
        return { ...p, balance: p.balance + each + (isFirst ? rem : 0) };
      });
      totalAwarded += pots[i].amount;
    }
    return { ...s, players, pot: 0, phase: 'handover', showdownData: null,
      handoverData: { reason: 'showdown', amount: totalAwarded, awards, pots } };
  });

  const nextHand = () => pushAction(s => {
    const remainingPlayers = s.players.filter(p => !p.requestRemove);
    const haveChips = remainingPlayers.filter(p => p.balance > 0);
    if (haveChips.length < 2) return { ...s, players: remainingPlayers, phase: 'gameover' };
    return startHand(s, false);
  });

  const rebuy = (playerId, amount) => pushAction(s => {
    if (amount <= 0) return s;
    const liveHand = s.phase === 'game' || s.phase === 'showdown';
    const players = s.players.map(p => {
      if (p.id !== playerId) return p;
      // If a busted/sitting-out player buys in while a hand is live, give the chips
      // but keep that player OUT of the current hand. startHand() will seat them next hand.
      const mustWaitNextHand = liveHand && p.sittingOut;
      return {
        ...p,
        balance: p.balance + amount,
        buyIns: (p.buyIns || 1) + 1,
        sittingOut: mustWaitNextHand ? true : false,
        requestSitOut: false,
      };
    });
    return { ...s, players, modal: null };
  });

  const addTablePlayer = (name, amount) => pushAction(s => {
    const cleanName = String(name || '').trim().slice(0, 14);
    const buyIn = Math.max(1, Math.round(Number(amount) || s.startingChips || 1));
    const duplicateName = s.players.some(p => p.name.trim().toLowerCase() === cleanName.toLowerCase());
    if (!cleanName || duplicateName || s.players.length >= 9) return s;

    const liveHand = s.phase === 'game' || s.phase === 'showdown';
    const newPlayer = {
      id: 'p'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7),
      name: cleanName,
      balance: buyIn,
      currentBet: 0, totalCommittedHand: 0,
      hasFolded: false, isAllIn: false,
      hasActedThisRound: true, lastAction: null,
      sittingOut: liveHand,
      requestSitOut: false,
      requestRemove: false,
      colorIdx: s.players.length % PG.length,
      buyIns: 1,
    };
    return { ...s, players: [...s.players, newPlayer], modal: null };
  });

  const removeTablePlayer = (playerId) => pushAction(s => {
    const player = s.players.find(p => p.id === playerId);
    if (!player) return s;
    const liveHand = s.phase === 'game' || s.phase === 'showdown';

    if (liveHand) {
      const players = s.players.map(p => p.id === playerId
        ? { ...p, requestRemove: true, requestSitOut: true }
        : p);
      return { ...s, players, modal: null };
    }

    const players = s.players.filter(p => p.id !== playerId);
    if (players.length < 2) return { ...s, players, modal: null, phase: 'gameover' };
    return { ...remapIndexesAfterPlayerListChange(s, players), modal: null };
  });

  if (state.phase === 'setup') return <SetupScreen onStart={startGame}/>;
  if (state.phase === 'gameover') return <GameOver state={state} onReset={() => setState(initialState)}/>;

  return (
    <GameScreen
      state={state}
      onFold={fold} onCheck={check} onCall={call} onRaise={raise}
      onUndo={undo} onAward={awardShowdown} onNext={nextHand}
      onMenu={() => setState(s => ({ ...s, modal: 'menu' }))}
      onPlayerTap={(playerId) => setState(s => ({ ...s, modal: { type: 'manage', playerId } }))}
      onCloseModal={() => setState(s => ({ ...s, modal: null }))}
      onAbandon={() => setState(initialState)}
      onRebuy={rebuy}
      onAddPlayer={addTablePlayer}
      onRemovePlayer={removeTablePlayer}
    />
  );
}

// ─── Setup ────────────────────────────────────────────────────────────────
function SetupScreen({ onStart }) {
  const [step, setStep] = useState('config');
  const [startingChips, setStartingChips] = useState(1000);
  const [blindLevels, setBlindLevels] = useState([
    { big: 10, small: 5,  duration: '' },
    { big: 20, small: 10, duration: '' },
    { big: 40, small: 20, duration: '' },
  ]);
  const [durationUnit, setDurationUnit] = useState('Minutes');
  const [playerNames, setPlayerNames] = useState([]);
  const [seats, setSeats] = useState([]); // 9 slots, each null or name
  const [randomDealer, setRandomDealer] = useState(true);
  const [initialDealerIdx, setInitialDealerIdx] = useState(0);
  const [nameInput, setNameInput] = useState('');
  const [seatModal, setSeatModal] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const inputRef = useRef(null);

  const addLevel = () => {
    const last = blindLevels.at(-1) || { big:10, small:5, duration:'' };
    setBlindLevels([...blindLevels, { big:Number(last.big)*2, small:Number(last.small)*2, duration:'' }]);
  };
  const removeLevel = (i) => setBlindLevels(blindLevels.filter((_,j)=>j!==i));
  const updateLevel = (i,f,v) => setBlindLevels(blindLevels.map((l,j)=>j===i?{...l,[f]:v}:l));

  const addPlayer = () => {
    const n = nameInput.trim().slice(0,14);
    if (!n || playerNames.length >= 9 || playerNames.includes(n)) return;
    setPlayerNames([...playerNames, n]);
    setNameInput('');
    setTimeout(() => inputRef.current?.focus(), 30);
  };
  const removePlayer = (i) => {
    const name = playerNames[i];
    setPlayerNames(playerNames.filter((_,j)=>j!==i));
    setSeats(seats.map(s => s === name ? null : s));
  };

  const validLevels = blindLevels.filter(l => Number(l.big) > 0 && Number(l.small) > 0);
  const canProceed = playerNames.length >= 2 && startingChips > 0 && validLevels.length >= 1;

  const goToSeating = () => {
    const numSeats = Math.max(playerNames.length, 6);
    const initial = Array(Math.min(9, Math.max(2, numSeats))).fill(null);
    // try to preserve any prior seating that's still valid
    const preserved = seats.length ? seats.map(s => playerNames.includes(s) ? s : null) : initial;
    while (preserved.length < initial.length) preserved.push(null);
    setSeats(preserved.slice(0, initial.length));
    setStep('seating');
  };

  const seatedPlayers = seats.filter(Boolean);
  const allSeated = seatedPlayers.length === playerNames.length && playerNames.every(p => seats.includes(p));
  const canStart = allSeated && seatedPlayers.length >= 2;

  const assignSeat = (seatIdx, name) => {
    setSeats(seats.map((s, i) => {
      if (i === seatIdx) return name;
      if (s === name) return null; // remove from old seat
      return s;
    }));
    setSeatModal(null);
  };
  const clearSeat = (i) => setSeats(seats.map((s,j) => j===i ? null : s));

  const addSeatSlot = () => { if (seats.length < 9) setSeats([...seats, null]); };
  const removeSeatSlot = (i) => {
    if (seats.length <= 2) return;
    setSeats(seats.filter((_,j) => j!==i));
  };

  const handleStart = () => {
    if (!canStart) return;
    if (randomDealer) {
      setSpinning(true);
    } else {
      const dealerName = seatedPlayers[initialDealerIdx % seatedPlayers.length];
      const seatedFinal = seats.filter(Boolean);
      const dealerSeatedIdx = seatedFinal.indexOf(dealerName);
      finishStart(seatedFinal, dealerSeatedIdx);
    }
  };
  const finishStart = (sp, dealerIdx) => {
    onStart({
      startingChips: Number(startingChips),
      blindLevels: validLevels.map(l => ({
        big: Number(l.big), small: Number(l.small), duration: Number(l.duration) || 0,
      })),
      durationUnit,
      seatedPlayers: sp,
      initialDealerIdx: dealerIdx,
      randomDealer,
    });
  };

  return (
    <div className="h-[100dvh] w-screen overflow-y-auto no-scrollbar bg-zinc-950 text-white relative">
      <div className="max-w-md mx-auto px-4 pb-32">
        {/* header */}
        <div className="flex items-center justify-between py-3 mb-1 sticky top-0 bg-zinc-950 z-30">
          <button
            onClick={() => step === 'seating' ? setStep('config') : null}
            className={`w-9 h-9 rounded-full flex items-center justify-center text-zinc-400 ${step==='seating'?'active:bg-zinc-800':''}`}
          >
            {step === 'seating' && (
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
            )}
          </button>
          <h1 className="text-xl font-bold">{step === 'config' ? 'Play' : 'Seating'}</h1>
          <div className="w-9 h-9"/>
        </div>

        {step === 'config' && (
          <ConfigStep
            startingChips={startingChips} setStartingChips={setStartingChips}
            blindLevels={blindLevels} addLevel={addLevel} removeLevel={removeLevel} updateLevel={updateLevel}
            durationUnit={durationUnit} setDurationUnit={setDurationUnit}
            playerNames={playerNames} nameInput={nameInput} setNameInput={setNameInput}
            addPlayer={addPlayer} removePlayer={removePlayer} inputRef={inputRef}
          />
        )}

        {step === 'seating' && (
          <SeatingStep
            seats={seats} playerNames={playerNames}
            randomDealer={randomDealer} setRandomDealer={setRandomDealer}
            initialDealerIdx={initialDealerIdx} setInitialDealerIdx={setInitialDealerIdx}
            onSeatTap={(i) => setSeatModal(i)}
            clearSeat={clearSeat}
            addSeatSlot={addSeatSlot}
            removeSeatSlot={removeSeatSlot}
          />
        )}
      </div>

      {/* bottom CTA */}
      <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-zinc-950 via-zinc-950 to-zinc-950/0 pb-4 pt-8 z-20">
        <div className="max-w-md mx-auto px-4" style={{paddingBottom:'env(safe-area-inset-bottom)'}}>
          {step === 'config' ? (
            <button
              onClick={goToSeating}
              disabled={!canProceed}
              className={`w-full py-4 rounded-2xl text-lg font-black tracking-wide transition ${
                canProceed ? 'btn-primary text-white active:scale-[0.98]' : 'bg-zinc-800 text-zinc-600'
              }`}
            >
              {playerNames.length < 2 ? `Need ${2 - playerNames.length} more player${playerNames.length===1?'':'s'}` : 'Continue → Seating'}
            </button>
          ) : (
            <button
              onClick={handleStart}
              disabled={!canStart}
              className={`w-full py-4 rounded-2xl text-lg font-black tracking-wide transition ${
                canStart ? 'btn-primary text-white active:scale-[0.98]' : 'bg-zinc-800 text-zinc-600'
              }`}
            >
              {!canStart ? `Seat all ${playerNames.length} players` : (randomDealer ? '🎲 Spin for Dealer' : 'Start Game')}
            </button>
          )}
        </div>
      </div>

      {seatModal !== null && (
        <SeatPickerModal
          seatIdx={seatModal}
          seats={seats}
          playerNames={playerNames}
          onPick={assignSeat}
          onClose={() => setSeatModal(null)}
        />
      )}

      {spinning && (
        <DealerWheel
          players={seats.filter(Boolean)}
          onComplete={(idx) => { setSpinning(false); finishStart(seats.filter(Boolean), idx); }}
        />
      )}
    </div>
  );
}

function ConfigStep({ startingChips, setStartingChips, blindLevels, addLevel, removeLevel, updateLevel, durationUnit, setDurationUnit, playerNames, nameInput, setNameInput, addPlayer, removePlayer, inputRef }) {
  return (
    <>
      {/* starting chips */}
      <div className="glass rounded-2xl p-3 mb-3">
        <label className="block text-zinc-400 text-xs font-semibold mb-2 px-1">Starting chips</label>
        <div className="flex items-center gap-2">
          <input type="text" value={startingChips || ''}
            onChange={e => setStartingChips(Math.max(0, parseInt(e.target.value.replace(/\D/g,'')) || 0))}
            className="flex-1 min-w-0 bg-zinc-800/80 rounded-xl px-4 py-3 text-white text-center text-lg font-bold focus:outline-none border border-zinc-700 tabular-nums"
            inputMode="numeric" pattern="[0-9]*" placeholder="1,000"/>
          <div className="w-12 h-12 shrink-0 rounded-full btn-blue flex items-center justify-center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.6 1.6 0 0 0-1-1.4 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.6 1.6 0 0 0 1.4-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
            </svg>
          </div>
        </div>
      </div>

      {/* Blinds */}
      <div className="glass rounded-2xl p-3 mb-3">
        <label className="block text-zinc-400 text-xs font-semibold mb-2 px-1">Blind structure</label>
        <div className="flex items-center justify-between mb-3 gap-2">
          <button onClick={addLevel} className="btn-blue text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition">+ Add level</button>
          <div className="flex-1 max-w-[150px]">
            <div className="text-zinc-500 text-[10px] font-semibold text-right mb-0.5">Duration unit</div>
            <select value={durationUnit} onChange={e => setDurationUnit(e.target.value)}
              className="w-full bg-zinc-800/80 text-white rounded-lg px-2 py-1.5 text-sm font-semibold focus:outline-none border border-zinc-700">
              <option>Minutes</option><option>Hands</option>
            </select>
          </div>
        </div>
        <div className="grid gap-1.5 mb-1.5 text-[9px] text-zinc-500 font-black uppercase tracking-wide px-0.5" style={{gridTemplateColumns:'24px minmax(0,1fr) minmax(0,1fr) minmax(0,1fr) 24px'}}>
          <div className="text-center">Lvl</div><div className="text-center">Big</div><div className="text-center">Small</div><div className="text-center">Dur.</div><div></div>
        </div>
        <div className="space-y-1.5">
          {blindLevels.map((l, i) => (
            <div key={i} className="grid gap-1.5 items-center" style={{gridTemplateColumns:'24px minmax(0,1fr) minmax(0,1fr) minmax(0,1fr) 24px'}}>
              <div className="text-white font-bold text-center text-sm">{i+1}</div>
              <input type="text" value={l.big} onChange={e => updateLevel(i,'big',e.target.value.replace(/\D/g,''))} className="min-w-0 bg-zinc-800/80 text-center rounded-lg px-1 py-2 text-white font-semibold focus:outline-none border border-zinc-700 text-sm tabular-nums" inputMode="numeric" pattern="[0-9]*"/>
              <input type="text" value={l.small} onChange={e => updateLevel(i,'small',e.target.value.replace(/\D/g,''))} className="min-w-0 bg-zinc-800/80 text-center rounded-lg px-1 py-2 text-white font-semibold focus:outline-none border border-zinc-700 text-sm tabular-nums" inputMode="numeric" pattern="[0-9]*"/>
              <input type="text" value={l.duration} onChange={e => updateLevel(i,'duration',e.target.value.replace(/\D/g,''))} className="min-w-0 bg-zinc-800/80 text-center rounded-lg px-1 py-2 text-white font-semibold focus:outline-none border border-zinc-700 text-sm tabular-nums" inputMode="numeric" pattern="[0-9]*" placeholder="—"/>
              <button onClick={() => removeLevel(i)} className="w-6 h-6 rounded-full bg-red-500 active:bg-red-600 text-white text-[10px] flex items-center justify-center font-bold">✕</button>
            </div>
          ))}
        </div>
      </div>

      {/* Players */}
      <div className="mb-4">
        <h2 className="text-2xl font-bold text-center mb-2">Players</h2>
        <div className="glass rounded-2xl p-3">
          <div className="flex gap-2 mb-2">
            <input ref={inputRef} value={nameInput} onChange={e => setNameInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addPlayer()}
              placeholder={`Player ${playerNames.length + 1}`}
              className="flex-1 bg-zinc-800/80 rounded-xl px-4 py-3 text-white focus:outline-none border border-zinc-700"
              maxLength={14} autoCapitalize="words"/>
            <button onClick={addPlayer} disabled={!nameInput.trim() || playerNames.length >= 9}
              className="px-5 rounded-xl btn-blue text-white font-bold disabled:opacity-40 disabled:bg-zinc-700">Add</button>
          </div>
          {playerNames.length > 0 && (
            <div className="space-y-1.5">
              {playerNames.map((name, i) => (
                <div key={name} className="flex items-center gap-2 bg-zinc-800/60 rounded-xl pl-2 pr-2 py-1.5 anim-fade">
                  <div className={`w-7 h-7 rounded-full bg-gradient-to-br ${PG[i%PG.length]} flex items-center justify-center text-white text-xs font-bold shrink-0`}>{name[0]?.toUpperCase()}</div>
                  <div className="flex-1 text-white font-semibold text-sm truncate">{name}</div>
                  <button onClick={() => removePlayer(i)} className="w-7 h-7 rounded-full bg-red-500/20 text-red-400 text-xs font-bold flex items-center justify-center shrink-0">✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

function SeatingStep({ seats, playerNames, randomDealer, setRandomDealer, initialDealerIdx, setInitialDealerIdx, onSeatTap, clearSeat, addSeatSlot, removeSeatSlot }) {
  const seatedNames = seats.filter(Boolean);
  const unseated = playerNames.filter(p => !seats.includes(p));
  return (
    <>
      <div className="text-zinc-400 text-sm text-center mb-3">
        Tap a seat to assign a player. Match your real-life seating order.
      </div>

      {/* Virtual table */}
      <div className="relative mb-3 mx-auto" style={{aspectRatio:'4/3.6', maxWidth:'420px'}}>
        <div className="absolute inset-2 felt-rim rounded-[50%] p-1.5">
          <div className="w-full h-full felt rounded-[50%] relative">
            {seats.map((name, i) => {
              const n = seats.length;
              const angle = -Math.PI/2 + (i/n) * 2 * Math.PI;
              const x = 50 + Math.cos(angle) * 46;
              const y = 50 + Math.sin(angle) * 44;
              const colorIdx = name ? playerNames.indexOf(name) % PG.length : 0;
              return (
                <div key={i} className="absolute" style={{left:x+'%', top:y+'%', transform:'translate(-50%,-50%)'}}>
                  <button onClick={() => onSeatTap(i)} className="block">
                    {name ? (
                      <div className={`bg-gradient-to-br ${PG[colorIdx]} text-white px-2 py-1 rounded-lg text-xs font-bold shadow-lg whitespace-nowrap`}>
                        <div className="text-[9px] opacity-80 -mb-0.5">Seat {i+1}</div>
                        {name}
                      </div>
                    ) : (
                      <div className="bg-zinc-800/70 backdrop-blur border-2 border-dashed border-zinc-600 text-zinc-500 px-2 py-1 rounded-lg text-xs font-bold whitespace-nowrap min-w-[60px] text-center">
                        <div className="text-[9px] opacity-80 -mb-0.5">Seat {i+1}</div>
                        + Add
                      </div>
                    )}
                  </button>
                  {seats.length > 2 && (
                    <button
                      onClick={() => removeSeatSlot(i)}
                      className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-zinc-900 text-zinc-400 text-[10px] flex items-center justify-center border border-zinc-700"
                      title="Remove seat"
                    >✕</button>
                  )}
                </div>
              );
            })}

            {/* center label */}
            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
              <div className="text-emerald-200/40 text-xs font-bold">{seatedNames.length}/{seats.length} seated</div>
            </div>
          </div>
        </div>
      </div>

      <div className="flex justify-center mb-3">
        <button onClick={addSeatSlot} disabled={seats.length >= 9}
          className="btn-dark px-4 py-2 rounded-xl text-sm font-bold text-zinc-300 disabled:opacity-40">
          + Add empty seat
        </button>
      </div>

      {/* Unseated chips */}
      {unseated.length > 0 && (
        <div className="glass rounded-2xl p-3 mb-3">
          <div className="text-zinc-400 text-xs font-semibold mb-2 px-1">Unseated players · tap a seat to place them</div>
          <div className="flex flex-wrap gap-1.5">
            {unseated.map(name => (
              <div key={name} className={`bg-gradient-to-br ${PG[playerNames.indexOf(name) % PG.length]} text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-md`}>
                {name}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Dealer choice */}
      <div className="glass rounded-2xl p-3 mb-3">
        <div className="text-zinc-400 text-xs font-semibold mb-2 px-1">Initial dealer</div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <button onClick={() => setRandomDealer(true)}
            className={`py-3 rounded-xl font-bold transition ${randomDealer ? 'btn-blue text-white' : 'btn-dark text-zinc-300'}`}>
            🎲 Random (spin)
          </button>
          <button onClick={() => setRandomDealer(false)}
            className={`py-3 rounded-xl font-bold transition ${!randomDealer ? 'btn-blue text-white' : 'btn-dark text-zinc-300'}`}>
            Pick manually
          </button>
        </div>
        {!randomDealer && seatedNames.length > 0 && (
          <div className="grid grid-cols-3 gap-1.5">
            {seatedNames.map((name, i) => (
              <button key={i} onClick={() => setInitialDealerIdx(i)}
                className={`py-2 px-2 rounded-lg text-xs font-bold transition ${initialDealerIdx === i ? 'bg-yellow-400 text-zinc-900' : 'bg-zinc-800/60 text-zinc-300'}`}>
                {initialDealerIdx === i && '🎯 '}{name}
              </button>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

function SeatPickerModal({ seatIdx, seats, playerNames, onPick, onClose }) {
  const occupant = seats[seatIdx];
  const available = playerNames.filter(p => !seats.includes(p) || p === occupant);
  return (
    <Modal onClose={onClose}>
      <div className="text-center mb-3">
        <div className="text-zinc-500 text-[10px] uppercase tracking-widest font-bold">Assign</div>
        <div className="text-white text-xl font-bold">Seat {seatIdx + 1}</div>
        {occupant && <div className="text-zinc-400 text-xs mt-1">Currently: <span className="text-white font-bold">{occupant}</span></div>}
      </div>
      <div className="space-y-2 mb-3 max-h-[50vh] overflow-y-auto">
        {available.length === 0 ? (
          <div className="text-center text-zinc-500 text-sm py-4">No players to seat. Add players in the previous step.</div>
        ) : available.map((name, i) => {
          const isCurrent = name === occupant;
          return (
            <button key={name} onClick={() => onPick(seatIdx, name)}
              className={`w-full p-3 rounded-2xl flex items-center gap-3 transition border ${isCurrent ? 'bg-emerald-500/15 border-emerald-500/40' : 'bg-zinc-800/60 border-transparent active:scale-[0.99]'}`}>
              <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${PG[playerNames.indexOf(name) % PG.length]} flex items-center justify-center text-white font-bold shadow-md`}>{name[0]?.toUpperCase()}</div>
              <div className="flex-1 text-left">
                <div className="text-white font-bold">{name}</div>
                {isCurrent && <div className="text-emerald-400 text-xs">Currently here</div>}
              </div>
            </button>
          );
        })}
      </div>
      <div className="grid grid-cols-2 gap-2">
        {occupant && (
          <button onClick={() => onPick(seatIdx, null)} className="py-3 rounded-2xl btn-red text-white font-bold">Clear seat</button>
        )}
        <button onClick={onClose} className={`py-3 rounded-2xl btn-dark text-zinc-200 font-bold ${occupant?'':'col-span-2'}`}>Cancel</button>
      </div>
    </Modal>
  );
}

// ─── Dealer Wheel ────────────────────────────────────────────────────────
function DealerWheel({ players, onComplete }) {
  const [rotation, setRotation] = useState(0);
  const [chosen, setChosen] = useState(null);
  const n = players.length;
  const segAngle = 360 / n;

  useEffect(() => {
    const winnerIdx = Math.floor(Math.random() * n);
    // Pointer is at top. CSS conic-gradient starts at 0° on top and transform rotate() is clockwise.
    // Rotate the wheel so the selected segment center lands exactly under the top pointer.
    const segCenter = (i) => i * segAngle + segAngle / 2;
    const targetMod = (360 - segCenter(winnerIdx)) % 360;
    const fullSpins = 5;
    const finalRotation = fullSpins * 360 + targetMod;

    // start spinning
    const t = setTimeout(() => setRotation(finalRotation), 50);
    const t2 = setTimeout(() => setChosen(winnerIdx), 4200);
    const t3 = setTimeout(() => onComplete(winnerIdx), 5800);
    return () => { clearTimeout(t); clearTimeout(t2); clearTimeout(t3); };
  }, []);

  // build conic gradient
  const colors = ['#dc2626','#2563eb','#16a34a','#ca8a04','#9333ea','#db2777','#0891b2','#ea580c','#4f46e5'];
  const stops = players.map((_, i) => {
    const a = i * segAngle;
    const b = (i+1) * segAngle;
    return `${colors[i % colors.length]} ${a}deg ${b}deg`;
  }).join(', ');

  return (
    <div className="fixed inset-0 z-50 bg-black/92 backdrop-blur-md flex flex-col items-center justify-center anim-fade px-4">
      <div className="text-center mb-6">
        <div className="text-white text-2xl font-black mb-1">Spinning for Dealer</div>
        <div className="text-zinc-400 text-sm">{chosen != null ? `🎯 ${players[chosen]}!` : 'Good luck...'}</div>
      </div>

      <div className="relative" style={{width:'min(90vw, 360px)', aspectRatio:'1'}}>
        {/* Pointer */}
        <div className="wheel-tick"/>
        {/* Outer ring */}
        <div className="absolute inset-0 rounded-full" style={{
          background: 'linear-gradient(180deg, #4a3320, #2a1a0c)',
          padding: '12px',
          boxShadow: '0 20px 60px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,200,140,0.2)'
        }}>
          {/* Wheel */}
          <div
            className="w-full h-full rounded-full relative"
            style={{
              background: `conic-gradient(${stops})`,
              transform: `rotate(${rotation}deg)`,
              transition: 'transform 4.2s cubic-bezier(0.17, 0.67, 0.21, 1)',
              boxShadow: 'inset 0 0 30px rgba(0,0,0,0.5)'
            }}
          >
            {players.map((name, i) => {
              const angle = i * segAngle + segAngle / 2;
              return (
                <div key={i} className="absolute top-0 left-0 w-full h-full pointer-events-none" style={{transform:`rotate(${angle}deg)`}}>
                  <div className="absolute left-1/2 top-3 -translate-x-1/2 origin-top text-white font-black text-sm whitespace-nowrap drop-shadow-lg" style={{paddingTop: '12%'}}>
                    {name.length > 8 ? name.slice(0, 8) : name}
                  </div>
                </div>
              );
            })}

            {/* Center hub */}
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-gradient-to-br from-zinc-200 to-zinc-500 shadow-lg border-4 border-zinc-800 flex items-center justify-center">
              <div className="text-zinc-900 font-black text-lg">D</div>
            </div>
          </div>
        </div>
      </div>

      {chosen != null && (
        <div className="mt-6 anim-pop">
          <div className="phase-banner px-6 py-3 rounded-2xl">
            <div className="text-xs font-bold text-zinc-700 text-center">DEALER</div>
            <div className="text-2xl font-black text-zinc-900 text-center">{players[chosen]}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Game Screen ─────────────────────────────────────────────────────────
function GameScreen({ state, onFold, onCheck, onCall, onRaise, onUndo, onAward, onNext, onMenu, onPlayerTap, onCloseModal, onAbandon, onRebuy, onAddPlayer, onRemovePlayer }) {
  const [raiseOpen, setRaiseOpen] = useState(false);
  const [phaseFlash, setPhaseFlash] = useState(false);
  const lastStreet = useRef(state.street);

  useEffect(() => {
    if (lastStreet.current !== state.street && (state.phase === 'game' || state.phase === 'showdown')) {
      setPhaseFlash(true);
      const t = setTimeout(() => setPhaseFlash(false), 1600);
      lastStreet.current = state.street;
      return () => clearTimeout(t);
    }
    lastStreet.current = state.street;
  }, [state.street, state.phase]);

  const turnPlayer = state.players[state.turnIdx];
  const inHand = state.phase === 'game';
  const totalPotDisplay = state.pot + state.players.reduce((s,p) => s + p.currentBet, 0);

  const lvl = state.blindLevels[state.blindLevelIdx];
  const blindLabel = lvl ? `${lvl.big}/${lvl.small}` : '';
  const timeLabel = state.durationUnit === 'Minutes' && state.timeRemainingSec > 0
    ? `${Math.floor(state.timeRemainingSec/60)}:${String(state.timeRemainingSec%60).padStart(2,'0')}`
    : null;

  const callAmount = inHand && turnPlayer ? Math.max(0, state.currentBet - turnPlayer.currentBet) : 0;
  const canCheck = inHand && turnPlayer && callAmount === 0;
  const canCall = inHand && turnPlayer && callAmount > 0;
  const canRaise = inHand && turnPlayer && turnPlayer.balance > 0 && (turnPlayer.balance + turnPlayer.currentBet) > state.currentBet;

  return (
    <div className="h-[100dvh] w-screen overflow-hidden bg-zinc-950 flex flex-col text-white relative">
      <header className="flex items-center justify-between px-3 py-2.5 border-b border-zinc-900 shrink-0 z-30 relative">
        <button onClick={onUndo} disabled={!state.history?.length}
          className="w-10 h-10 rounded-full flex items-center justify-center text-zinc-300 active:bg-zinc-800 disabled:text-zinc-700 disabled:active:bg-transparent">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/>
          </svg>
        </button>
        <div className="flex flex-col items-center">
          <div className="text-white font-bold text-base">{STREET_LABELS[state.street] || ''}</div>
          {state.phase === 'showdown' && <div className="text-amber-300 text-xs font-bold">Select winners</div>}
        </div>
        <div className="flex items-center gap-2">
          <div className="text-right">
            <div className="text-amber-300 text-sm font-black tabular-nums leading-none">{blindLabel}</div>
            {timeLabel
              ? <div className="text-zinc-500 text-[10px] tabular-nums">{timeLabel}</div>
              : <div className="text-zinc-500 text-[10px]">Lvl {state.blindLevelIdx+1}/{state.blindLevels.length}</div>}
          </div>
          <button onClick={onMenu} className="w-10 h-10 rounded-full flex items-center justify-center text-zinc-300 active:bg-zinc-800">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
              <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
            </svg>
          </button>
        </div>
      </header>

      <div className="flex-1 relative overflow-hidden px-2 py-2">
        <PokerTable
          state={state}
          totalPot={totalPotDisplay}
          onPlayerTap={onPlayerTap}
        />

        {phaseFlash && (
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-30">
            <div className="phase-banner px-8 py-4 rounded-2xl anim-phase">
              <div className="text-3xl font-black tracking-wider">{STREET_LABELS[state.street]}</div>
            </div>
          </div>
        )}
      </div>

      <div className="shrink-0 px-3 pt-2 pb-3 z-20 relative" style={{paddingBottom:'max(0.75rem, env(safe-area-inset-bottom))'}}>
        {state.phase === 'showdown' ? (
          <ShowdownPanel state={state} onAward={onAward}/>
        ) : state.phase === 'handover' ? (
          <HandoverPanel state={state} onNext={onNext}/>
        ) : (
          <ActionPanel
            turnPlayer={turnPlayer} callAmount={callAmount}
            canCheck={canCheck} canCall={canCall} canRaise={canRaise}
            onFold={onFold} onCheck={onCheck} onCall={onCall}
            onRaise={() => setRaiseOpen(true)}
          />
        )}
      </div>

      {raiseOpen && turnPlayer && (
        <RaiseModal
          state={state} player={turnPlayer}
          onClose={() => setRaiseOpen(false)}
          onConfirm={(amt) => { onRaise(amt); setRaiseOpen(false); }}
        />
      )}

      {state.modal === 'menu' && (
        <MenuModal
          state={state}
          onClose={onCloseModal}
          onAbandon={onAbandon}
          onAddPlayer={onAddPlayer}
        />
      )}

      {state.modal?.type === 'manage' && (
        <ManagePlayerModal
          state={state}
          playerId={state.modal.playerId}
          onClose={onCloseModal}
          onRebuy={onRebuy}
          onRemovePlayer={onRemovePlayer}
        />
      )}

      {state.phase === 'handover' && state.handoverData && (
        <ConfettiBurst key={state.handsPlayed}/>
      )}
    </div>
  );
}

// ─── Poker Table ─────────────────────────────────────────────────────────
function PokerTable({ state, totalPot, onPlayerTap }) {
  const players = state.players;
  const numCards = STREET_CARDS[state.street] || 0;

  return (
    <div className="w-full h-full relative">
      <div
        className="absolute felt-rim rounded-[50%] p-2"
        style={{aspectRatio:'0.78', maxHeight:'95%', maxWidth:'min(100%, 95vh)', left:'50%', top:'50%', transform:'translate(-50%, -50%)', width:'100%'}}
      >
        <div className="w-full h-full felt rounded-[50%] relative">
          {/* center: cards + pot */}
          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
            {numCards > 0 && (
              <div className="flex gap-1 mb-2" key={state.street}>
                {Array.from({length: numCards}).map((_,i) => (
                  <div key={i} className="card-back card-flip-in" style={{width:24, height:32, animationDelay: `${i*0.08}s`}}/>
                ))}
              </div>
            )}
            <div className="text-center" key={'pot-'+totalPot}>
              <div className="text-emerald-200/70 text-[10px] uppercase tracking-widest font-bold">Pot</div>
              <div className={`text-white text-3xl font-black tabular-nums leading-none mt-0.5 ${state.phase === 'handover' ? 'win-glow' : ''}`} style={{textShadow:'0 2px 4px rgba(0,0,0,0.6)'}}>
                {fmt(totalPot)}
              </div>
            </div>
          </div>

          {players.map((p, i) => {
            const n = players.length;
            const angle = -Math.PI/2 + (i/n) * 2 * Math.PI;
            const x = 50 + Math.cos(angle) * 56;
            const y = 50 + Math.sin(angle) * 54;
            const isWinner = state.phase === 'handover' && state.handoverData?.winnerIds?.includes(p.id);
            const showdownWinnerIds = state.phase === 'handover' && state.handoverData?.awards
              ? new Set(state.handoverData.awards.flat())
              : new Set();
            const isShowdownWinner = showdownWinnerIds.has(p.id);
            return (
              <PlayerSeat
                key={p.id}
                player={p} index={i} x={x} y={y} angle={angle}
                isDealer={i === state.dealerIdx}
                isSB={i === state.sbIdx}
                isBB={i === state.bbIdx}
                isTurn={i === state.turnIdx && state.phase === 'game'}
                isWinner={isWinner || isShowdownWinner}
                onTap={() => onPlayerTap(p.id)}
              />
            );
          })}
        </div>
      </div>
    </div>
  );
}

function PlayerSeat({ player, x, y, angle, isDealer, isSB, isBB, isTurn, isWinner, onTap }) {
  const tagColor = (a) => {
    if (a === 'Fold') return 'bg-orange-500';
    if (a === 'Bet' || a === 'Raise') return 'bg-blue-600';
    if (a === 'Check') return 'bg-blue-500';
    if (a === 'Call') return 'bg-emerald-600';
    return null;
  };
  const tag = tagColor(player.lastAction);
  const folded = player.hasFolded;
  const bcx = 50 + Math.cos(angle) * 32;
  const bcy = 50 + Math.sin(angle) * 30;
  const tcx = 50 + Math.cos(angle) * 42;
  const tcy = 50 + Math.sin(angle) * 41;

  return (
    <>
      {/* Bet chip */}
      {player.currentBet > 0 && (
        <div className="absolute z-10 pointer-events-none anim-pop" style={{left: bcx+'%', top: bcy+'%', transform:'translate(-50%,-50%)'}} key={'bc-'+player.currentBet}>
          <div className="flex items-center gap-1 bg-black/40 rounded-full pl-0.5 pr-2 py-0.5 backdrop-blur-sm">
            <div className="w-4 h-4 rounded-full bet-chip"/>
            <span className="text-white text-[11px] font-black tabular-nums">{fmt(player.currentBet)}</span>
          </div>
        </div>
      )}

      {/* D / SB / BB */}
      {(isDealer || isSB || isBB) && (
        <div className="absolute z-10 pointer-events-none" style={{left: tcx+'%', top: tcy+'%', transform:'translate(-50%,-50%)'}}>
          {isDealer && <div className="dealer-btn w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black">D</div>}
          {!isDealer && isSB && <div className="w-6 h-6 rounded-full bg-zinc-200 text-zinc-900 flex items-center justify-center text-[8px] font-black shadow">SB</div>}
          {!isDealer && isBB && <div className="w-6 h-6 rounded-full bg-zinc-200 text-zinc-900 flex items-center justify-center text-[8px] font-black shadow">BB</div>}
        </div>
      )}

      <div
        className={`absolute z-20 transition-all duration-300 ${folded ? 'opacity-50 grayscale' : ''} ${isTurn ? 'scale-110 z-30' : ''}`}
        style={{left: x+'%', top: y+'%', transform:'translate(-50%,-50%)', width:'82px'}}
      >
        {/* Spotlight */}
        {isTurn && (
          <div className="absolute" style={{inset:'-40%', pointerEvents:'none'}}>
            <div className="spotlight"/>
          </div>
        )}

        <button onClick={onTap} className="block w-full text-left relative">
          <div className={`relative bg-zinc-900 rounded-lg overflow-hidden shadow-xl
            ${isTurn ? 'active-turn' : isWinner ? 'ring-2 ring-amber-300' : 'border border-zinc-800'}
            ${isWinner ? 'win-glow' : ''}`}>
            {/* Inner gradient overlay */}
            {isTurn && <div className="absolute inset-0 bg-gradient-to-b from-amber-300/15 to-transparent pointer-events-none"/>}
            <div className="px-1.5 py-1 relative">
              <div className="text-white text-[11px] font-bold leading-tight truncate text-center">{player.name}</div>
              <div className={`text-sm font-black tabular-nums leading-tight text-center ${isWinner ? 'text-amber-300 win-glow' : 'text-amber-300'}`}>
                {fmt(player.balance)}
              </div>
            </div>
            {tag && !player.sittingOut && (
              <div className={`${tag} text-white text-[10px] font-bold text-center py-0.5 leading-tight`}>
                {player.lastAction}
              </div>
            )}
            {player.isAllIn && !player.hasFolded && (
              <div className="bg-purple-600 text-white text-[10px] font-bold text-center py-0.5 leading-tight">All In</div>
            )}
            {player.requestRemove ? (
              <div className="bg-red-700 text-red-100 text-[10px] font-bold text-center py-0.5 leading-tight">Leaving</div>
            ) : player.sittingOut && (
              <div className="bg-zinc-700 text-zinc-300 text-[10px] font-bold text-center py-0.5 leading-tight">Out</div>
            )}
          </div>
          {/* Turn arrow */}
          {isTurn && (
            <div className="absolute -top-3 left-1/2 turn-arrow" style={{transform:'translateX(-50%)'}}>
              <div className="text-amber-300 text-2xl drop-shadow-lg" style={{filter:'drop-shadow(0 0 6px #fbbf24)'}}>▼</div>
            </div>
          )}
        </button>
      </div>
    </>
  );
}

// ─── Action Panel ────────────────────────────────────────────────────────
